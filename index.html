<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChangeLog Component</title>
    <style>
      body {
        margin: 0;
        background: #f5f5f5;
        font-family: Arial, Helvetica, sans-serif;
        
      }
      /* HEADER */
      header {
        padding: 40px 20px 30px;
        text-align: center;
      }
      .titulo-header {
       margin-bottom: 10px;
        font-size: 42px;
      }
      .subtitulo-header {
        color: gray;
        margin: 0;
      }

      /* TIMELINE */
      .section-data-log {
        border: black solid;
        border-radius: 40px; 
        max-width: 800px;
        margin: 40px auto;
        position: relative;
        padding: 20px 0;
      }
    /* LÍNEA VERTICAL */
    .section-data-log::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 2px;
        width: 2px;
        height: 100%;
        background: #ccc;
        transform: translateX(-50%);
    }
    /*  ITEM */
    .timeline-item { 
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: center;
        position: relative;
        margin: 30px 0;
    }
    /* FECHA */
    .fecha {
        text-align: right;
        padding-right: 30px;
        font-weight: bold;
        color: #555;
    }
    /* CAMBIO */
    .cambio {
        padding-left: 30px;
    }
    .cambio a {
        text-decoration: none;
        color: black;
        font-weight: 500;
    }
    .cambio a:hover {
        color: #0077ff;
    }
    /* PUNTO */
    .timeline-item::before {
        content: "";
        position: absolute;
        left: 50%;
        width: 14px;
        height: 14px;
        background: black;
        border-radius: 50%;
        transform: translate(-50%, 0);
    }
    /* BOTÓN */
    .section-btn {
        text-align: center;
        padding: 40px 0 6px;
    }
    .btn-visitar {
        padding: 12px 24px;
        border: none;
        background: black;
        color: white;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s ease;
    }
    .btn-visitar:hover {
        background: #0077ff;
    }
    /* RESPONSIVE */
    @media(max-width: 700px){
        .section-data-log::before {
            left: 20px;
        }
        .timeline-item {
            grid-template-columns: 1fr;
            padding-left: 40px;
        }
        .fecha {
            text-align: left;
            padding: 0;
            margin-bottom: 5px;
        }
        .cambio {
            padding: 0;
        }
        .timeline-item::before {
            left: 20px;
        }
    }   
    </style>
  </head>
  <body>
    <header>
      <h2 class="titulo-header">ChangeLog</h2>
      <p class="subtitulo-header">
        Aqui está todo lo que tenemos agregado desde los ultimos 5 días.
      </p>
    </header>
    <section class="section-data-log">
      <div class="timeline-item">
        <div class="fecha">Mayo 1</div>
        <div class="cambio"><a href="#">Improved Performance</a></div>
      </div>
      <div class="timeline-item">
        <div class="fecha">Mayo 2</div>
        <div class="cambio"><a href="#">Improved Performance</a></div>
      </div>
      <div class="timeline-item">
        <div class="fecha">Mayo 3</div>
        <div class="cambio"><a href="#">Improved Performance</a></div>
      </div>
      <div class="timeline-item">
        <div class="fecha">Mayo 4</div>
        <div class="cambio"><a href="#">Improved Performance</a></div>
      </div>
      <div class="timeline-item">
        <div class="fecha">mayo 5</div>
        <div class="cambio"><a href="#">Improved Performance</a></div>
      </div>
    </section>
    <section class="section-btn">
      <button class="btn-visitar" type="submit">
        Visitar Changelog Completo
      </button>
    </section>
  </body>
</html>
